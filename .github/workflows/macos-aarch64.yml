name: Build macOS Apple Silicon CLI

on:
    push:
        tags:
            - v*
    workflow_dispatch:

jobs:
    build-macos-aarch64:
        name: Build sonar for macOS Apple Silicon
        runs-on: macos-latest

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Install Rust toolchain
              uses: dtolnay/rust-toolchain@stable
              with:
                  targets: aarch64-apple-darwin

            - name: Build release binary
              run: cargo build --locked --release --target aarch64-apple-darwin --bin sonar

            - name: Upload sonar
              uses: actions/upload-artifact@v4
              with:
                  name: sonar-macos-aarch64
                  path: target/aarch64-apple-darwin/release/sonar
                  if-no-files-found: error
