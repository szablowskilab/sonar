name: Build Windows x86_64 CLI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build-windows-x86_64:
    name: Build sonar for Windows x86_64
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Build release binary
        run: cargo build --locked --release --target x86_64-pc-windows-msvc --bin sonar

      - name: Upload sonar.exe
        uses: actions/upload-artifact@v4
        with:
          name: sonar-windows-x86_64
          path: target/x86_64-pc-windows-msvc/release/sonar.exe
          if-no-files-found: error
