name: Build Linux x86_64 CLI

on:
    push:
        tags:
            - v*
    workflow_dispatch:

jobs:
    build-linux-x86_64:
        name: Build sonar for Linux x86_64
        runs-on: ubuntu-latest

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Install Rust toolchain
              uses: dtolnay/rust-toolchain@stable
              with:
                  targets: x86_64-unknown-linux-gnu

            - name: Build release binary
              run: cargo build --locked --release --target x86_64-unknown-linux-gnu --bin sonar

            - name: Upload sonar
              uses: actions/upload-artifact@v4
              with:
                  name: sonar-linux-x86_64
                  path: target/x86_64-unknown-linux-gnu/release/sonar
                  if-no-files-found: error
