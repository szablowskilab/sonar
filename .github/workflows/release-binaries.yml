name: Release CLI binaries

on:
    push:
        tags:
            - v*
    workflow_dispatch:

permissions:
    contents: write

jobs:
    validate-release-tag:
        name: Validate release tag
        runs-on: ubuntu-latest

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Install Rust toolchain
              uses: dtolnay/rust-toolchain@stable

            - name: Verify release tag matches crate version
              if: startsWith(github.ref, 'refs/tags/')
              shell: bash
              run: |
                  crate_version="$(cargo pkgid | sed 's/.*@//')"
                  expected_tag="v${crate_version}"

                  if [ "$GITHUB_REF_NAME" != "$expected_tag" ]; then
                      echo "Tag $GITHUB_REF_NAME does not match crate version $crate_version; expected $expected_tag."
                      exit 1
                  fi

    build:
        name: Build ${{ matrix.name }}
        runs-on: ${{ matrix.os }}
        needs: validate-release-tag

        strategy:
            fail-fast: false
            matrix:
                include:
                    - name: Linux x86_64
                      os: ubuntu-latest
                      target: x86_64-unknown-linux-gnu
                      binary: target/x86_64-unknown-linux-gnu/release/sonar
                      asset: sonar-linux-x86_64.tar.gz
                    - name: macOS Apple Silicon
                      os: macos-latest
                      target: aarch64-apple-darwin
                      binary: target/aarch64-apple-darwin/release/sonar
                      asset: sonar-macos-aarch64.tar.gz
                    - name: Windows x86_64
                      os: windows-latest
                      target: x86_64-pc-windows-msvc
                      binary: target/x86_64-pc-windows-msvc/release/sonar.exe
                      asset: sonar-windows-x86_64.zip

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Install Rust toolchain
              uses: dtolnay/rust-toolchain@stable
              with:
                  targets: ${{ matrix.target }}

            - name: Build release binary
              run: cargo build --locked --release --target ${{ matrix.target }} --bin sonar

            - name: Package Unix release asset
              if: runner.os != 'Windows'
              env:
                  BINARY: ${{ matrix.binary }}
                  ASSET: ${{ matrix.asset }}
              run: |
                  mkdir -p dist
                  cp "$BINARY" dist/sonar
                  chmod +x dist/sonar
                  tar -C dist -czf "$ASSET" sonar

            - name: Package Windows release asset
              if: runner.os == 'Windows'
              shell: pwsh
              env:
                  BINARY: ${{ matrix.binary }}
                  ASSET: ${{ matrix.asset }}
              run: |
                  New-Item -ItemType Directory -Force dist | Out-Null
                  Copy-Item $env:BINARY dist/sonar.exe
                  Compress-Archive -Path dist/sonar.exe -DestinationPath $env:ASSET -Force

            - name: Upload release asset artifact
              uses: actions/upload-artifact@v4
              with:
                  name: ${{ matrix.asset }}
                  path: ${{ matrix.asset }}
                  if-no-files-found: error

    release:
        name: Publish GitHub release
        runs-on: ubuntu-latest
        needs: build
        if: startsWith(github.ref, 'refs/tags/v')

        steps:
            - name: Download release assets
              uses: actions/download-artifact@v4
              with:
                  path: release-assets
                  merge-multiple: true

            - name: Create release and upload assets
              env:
                  GH_TOKEN: ${{ github.token }}
                  GH_REPO: ${{ github.repository }}
              run: |
                  mapfile -t assets < <(find release-assets -type f | sort)
                  prerelease_flag=""

                  if [ "${#assets[@]}" -eq 0 ]; then
                      echo "No release assets found in release-assets."
                      exit 1
                  fi

                  if [[ "$GITHUB_REF_NAME" == *-* ]]; then
                      prerelease_flag="--prerelease"
                  fi

                  if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
                      if [ -n "$prerelease_flag" ]; then
                          gh release edit "$GITHUB_REF_NAME" --prerelease
                      fi
                      gh release upload "$GITHUB_REF_NAME" "${assets[@]}" --clobber
                  else
                      gh release create "$GITHUB_REF_NAME" "${assets[@]}" --title "$GITHUB_REF_NAME" --generate-notes $prerelease_flag
                  fi
